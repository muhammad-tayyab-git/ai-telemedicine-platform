version: '3.8'

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: telemedicine_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: telemedicine_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemedicine_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      SYMPTOM_SERVICE_URL: http://ai-symptom-service:8001
      IMAGE_SERVICE_URL: http://ai-image-service:8002
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ─── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telemedicine_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─── AI Symptom Triage Service ──────────────────────────────────────────────
  ai-symptom-service:
    build:
      context: ./ai-symptom-service
      dockerfile: Dockerfile
    container_name: telemedicine_symptom_ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ai-symptom-service/models:/app/models

  # ─── AI Image Screening Service ─────────────────────────────────────────────
  ai-image-service:
    build:
      context: ./ai-image-service
      dockerfile: Dockerfile
    container_name: telemedicine_image_ai
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./ai-image-service/models:/app/models

volumes:
  postgres_data:
  mongo_data:
