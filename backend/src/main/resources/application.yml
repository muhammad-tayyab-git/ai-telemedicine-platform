server:
  port: ${SPRING_PORT:8080}

spring:
  application:
    name: ai-telemedicine-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telemedicine_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  data:
    mongodb:
      host: ${MONGO_HOST:localhost}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DB:telemedicine_logs}
      username: ${MONGO_USERNAME:mongo}
      password: ${MONGO_PASSWORD:mongo}

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForDevOnlyMustBeChangedInProduction}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ─── AI Microservices ────────────────────────────────────────────────────────
ai:
  symptom-service:
    url: ${SYMPTOM_SERVICE_URL:http://localhost:8001}
  image-service:
    url: ${IMAGE_SERVICE_URL:http://localhost:8002}

# ─── Swagger / OpenAPI ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ─── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.telemedicine: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
